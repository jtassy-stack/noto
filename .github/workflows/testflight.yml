name: CI / TestFlight

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  SCHEME: Noto

jobs:
  # ──────────────────────────────────────────────
  # Job 1 — Build (every PR + master push)
  # Compiles for simulator, no signing required.
  # ──────────────────────────────────────────────
  build:
    name: Build (simulator)
    runs-on: macos-15
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select latest Xcode
        run: |
          XCODE_PATH=$(ls -d /Applications/Xcode*.app 2>/dev/null | sort -V | tail -1)
          echo "Using $XCODE_PATH"
          sudo xcode-select -s "$XCODE_PATH"
          xcodebuild -version

      - name: Cache Homebrew
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/Homebrew
          key: homebrew-xcodegen-${{ runner.os }}

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Cache Swift packages
        uses: actions/cache@v4
        with:
          path: SourcePackages
          key: spm-${{ runner.os }}-${{ hashFiles('**/Package.resolved') }}
          restore-keys: spm-${{ runner.os }}-

      - name: Resolve Swift packages
        run: |
          xcodebuild -resolvePackageDependencies \
            -project Noto.xcodeproj \
            -scheme "$SCHEME" \
            -clonedSourcePackagesDirPath SourcePackages

      - name: Build for simulator
        run: |
          set -o pipefail
          xcodebuild build \
            -project Noto.xcodeproj \
            -scheme "$SCHEME" \
            -configuration Debug \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest' \
            -clonedSourcePackagesDirPath SourcePackages \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            | xcpretty || true

      - name: Run unit tests
        run: |
          set -o pipefail
          xcodebuild test \
            -project Noto.xcodeproj \
            -scheme NotoTests \
            -configuration Debug \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest' \
            -clonedSourcePackagesDirPath SourcePackages \
            -enableCodeCoverage YES \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            | xcpretty

      - name: Fix build with Claude
        if: failure()
        uses: anthropics/claude-code-action@beta
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          allowed_tools: "Bash,Read,Write,Edit,Glob,Grep"
          prompt: |
            The iOS build just failed on branch ${{ github.ref_name }}.

            Run `gh run view --log-failed ${{ github.run_id }}` to get the compiler errors,
            identify the root cause, fix the code, and commit + push directly to ${{ github.ref_name }}.

            Working directory is the repo root. Be concise and act directly.

  # ──────────────────────────────────────────────
  # Job 2 — Archive + TestFlight (master only)
  # Requires build to pass first.
  # ──────────────────────────────────────────────
  deploy:
    name: Archive & Upload to TestFlight
    runs-on: macos-15
    timeout-minutes: 40
    needs: build
    if: github.ref == 'refs/heads/master' && github.event_name != 'pull_request'

    env:
      ARCHIVE_PATH: build/Noto.xcarchive
      EXPORT_PATH: build/export

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select latest Xcode
        run: |
          XCODE_PATH=$(ls -d /Applications/Xcode*.app 2>/dev/null | sort -V | tail -1)
          sudo xcode-select -s "$XCODE_PATH"
          xcodebuild -version

      - name: Cache Homebrew
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/Homebrew
          key: homebrew-xcodegen-${{ runner.os }}

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Cache Swift packages
        uses: actions/cache@v4
        with:
          path: SourcePackages
          key: spm-${{ runner.os }}-${{ hashFiles('**/Package.resolved') }}
          restore-keys: spm-${{ runner.os }}-

      - name: Install certificate and provisioning profile
        env:
          APPLE_CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          PP_NOTO: ${{ secrets.PROVISIONING_PROFILE_NOTO }}
          PP_NOTO_DEVICEACTIVITY: ${{ secrets.PROVISIONING_PROFILE_NOTO_DEVICEACTIVITY }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -hex 16)

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          CERT_PATH=$RUNNER_TEMP/certificate.p12
          printf '%s' "$APPLE_CERTIFICATE_BASE64" | base64 --decode > "$CERT_PATH"
          security import "$CERT_PATH" \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 \
            -k "$KEYCHAIN_PATH"

          security set-key-partition-list -S apple-tool:,apple: \
            -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain-db

          PP_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"
          mkdir -p "$PP_DIR"
          printf '%s' "$PP_NOTO" | base64 --decode > "$PP_DIR/noto.mobileprovision"
          printf '%s' "$PP_NOTO_DEVICEACTIVITY" | base64 --decode > "$PP_DIR/noto-deviceactivity.mobileprovision"

      - name: Resolve Swift packages
        run: |
          xcodebuild -resolvePackageDependencies \
            -project Noto.xcodeproj \
            -scheme "$SCHEME" \
            -clonedSourcePackagesDirPath SourcePackages

      - name: Archive
        run: |
          xcodebuild archive \
            -project Noto.xcodeproj \
            -scheme "$SCHEME" \
            -configuration Release \
            -archivePath "$ARCHIVE_PATH" \
            -destination generic/platform=iOS \
            -sdk iphoneos \
            -clonedSourcePackagesDirPath SourcePackages \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            DEVELOPMENT_TEAM=ZU448G6529

      - name: Prepare App Store Connect API key
        env:
          API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          API_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_API_KEY_BASE64 }}
        run: |
          mkdir -p ~/.private_keys
          printf '%s' "$API_KEY_BASE64" | base64 --decode \
            > ~/.private_keys/AuthKey_${API_KEY_ID}.p8

      - name: Export and upload to TestFlight
        env:
          API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
        run: |
          xcodebuild -exportArchive \
            -archivePath "$ARCHIVE_PATH" \
            -exportOptionsPlist ci_scripts/ExportOptions.plist \
            -exportPath "$EXPORT_PATH" \
            -allowProvisioningUpdates \
            -authenticationKeyPath ~/.private_keys/AuthKey_${API_KEY_ID}.p8 \
            -authenticationKeyID "$API_KEY_ID" \
            -authenticationKeyIssuerID "$ISSUER_ID"

      - name: Cleanup keychain
        if: always()
        run: security delete-keychain $RUNNER_TEMP/app-signing.keychain-db || true
