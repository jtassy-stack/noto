name: Noto
options:
  bundleIdPrefix: fr.noto
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic

packages:
  SwiftMail:
    url: https://github.com/Cocoanetics/SwiftMail
    from: "1.5.1"

targets:
  Noto:
    type: application
    platform: iOS
    sources:
      - path: Noto
    dependencies:
      - package: SwiftMail
        product: SwiftMail
    settings:
      base:
        INFOPLIST_FILE: Noto/App/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: fr.noto.app
        MARKETING_VERSION: "2.0.0"
        CURRENT_PROJECT_VERSION: 1
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    entitlements:
      path: Noto/App/Noto.entitlements
