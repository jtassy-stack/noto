name: Noto
options:
  bundleIdPrefix: fr.noto
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic

packages:
  SwiftMail:
    url: https://github.com/Cocoanetics/SwiftMail
    from: "1.5.1"

targets:
  Noto:
    type: application
    platform: iOS
    sources:
      - path: Noto
      - path: Noto/Resources/Assets.xcassets
      - path: Shared
    dependencies:
      - package: SwiftMail
        product: SwiftMail
      - sdk: FamilyControls.framework
      - sdk: DeviceActivity.framework
      - target: NotoDeviceActivity
        embed: false
        link: false
    settings:
      base:
        INFOPLIST_FILE: Noto/App/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: fr.noto.app
        MARKETING_VERSION: "2.0.0"
        CURRENT_PROJECT_VERSION: 1
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        PROVISIONING_PROFILE_SPECIFIER: "noto appstore"
        DEVELOPMENT_ASSET_PATHS: "\"Noto/Preview Content\""
    entitlements:
      path: Noto/App/Noto.entitlements
    postBuildScripts:
      - name: Embed DeviceActivity extension (device only)
        script: |
          if [ "$PLATFORM_NAME" != "iphonesimulator" ]; then
            PLUGINS_DIR="$BUILT_PRODUCTS_DIR/$PLUGINS_FOLDER_PATH"
            mkdir -p "$PLUGINS_DIR"
            SRC="$BUILT_PRODUCTS_DIR/NotoDeviceActivity.appex"
            if [ -d "$SRC" ]; then
              cp -r "$SRC" "$PLUGINS_DIR/"
              codesign --force --sign "$EXPANDED_CODE_SIGN_IDENTITY" \
                --entitlements "$SCRIPT_INPUT_FILE_0" \
                "$PLUGINS_DIR/NotoDeviceActivity.appex"
            fi
          fi
        inputFiles:
          - $(SRCROOT)/NotoDeviceActivity/NotoDeviceActivity.entitlements
        basedOnDependencyAnalysis: false

  NotoDeviceActivity:
    type: app-extension
    platform: iOS
    sources:
      - path: NotoDeviceActivity
      - path: Shared
    dependencies:
      - sdk: DeviceActivity.framework
      - sdk: FamilyControls.framework
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: fr.noto.app.deviceactivity
        INFOPLIST_FILE: NotoDeviceActivity/Info.plist
        SWIFT_VERSION: "6.0"
        SKIP_INSTALL: YES
        APPLICATION_EXTENSION_API_ONLY: YES
        MARKETING_VERSION: "2.0.0"
        CURRENT_PROJECT_VERSION: 1
        PROVISIONING_PROFILE_SPECIFIER: "noto deviceactivity appstore"
        # Device Activity extensions only run on real devices
        SUPPORTED_PLATFORMS: iphoneos
    entitlements:
      path: NotoDeviceActivity/NotoDeviceActivity.entitlements

  NotoTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: NotoTests
    dependencies:
      - target: Noto
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: fr.noto.app.tests
        BUNDLE_LOADER: "$(TEST_HOST)"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Noto.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/Noto"
        # Simulator-only runs; disable signing entirely rather than mixing
        # Automatic style with CODE_SIGNING_ALLOWED=NO (contradictory).
        CODE_SIGNING_ALLOWED: "NO"
        CODE_SIGNING_REQUIRED: "NO"
        CODE_SIGN_IDENTITY: ""
    scheme:
      testTargets:
        - NotoTests
      gatherCoverageData: true
