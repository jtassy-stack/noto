name: Noto
options:
  bundleIdPrefix: com.pmf
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic

targets:
  Noto:
    type: application
    platform: iOS
    sources:
      - path: Noto
    resources:
      - path: Noto/Resources
    settings:
      base:
        INFOPLIST_FILE: Noto/App/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.pmf.noto
        MARKETING_VERSION: "2.0.0"
        CURRENT_PROJECT_VERSION: 1
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    entitlements:
      path: Noto/App/Noto.entitlements
